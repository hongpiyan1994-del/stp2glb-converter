name: Build Windows EXE

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download Blender
        shell: pwsh
        run: |
          $blenderUrl = "https://download.blender.org/release/Blender4.2/blender-4.2.0-windows-x64.zip"
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri $blenderUrl -OutFile blender.zip -UseBasicParsing
          Expand-Archive -Path blender.zip -DestinationPath . -Force
          Remove-Item blender.zip
          $extractedDir = Get-ChildItem -Directory | Where-Object { $_.Name -like "blender*" } | Select-Object -First 1
          if ($extractedDir) { Move-Item $extractedDir.FullName blender }          

      - name: Verify Blender
        run: |
          if (Test-Path "./blender/blender.exe") { echo "Blender found" } else { echo "Blender NOT found"; exit 1 }          

      - name: Build EXE
        run: |
          python -m PyInstaller converter.spec --noconfirm 2>&1
          if ($LASTEXITCODE -ne 0) {
            echo "SPEC FAILED, trying onefile..."
            python -m PyInstaller converter_gui.py --onefile --noconfirm --console 2>&1
          }          

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: STP2GLB_Converter
          path: dist/
          retention-days: 7
