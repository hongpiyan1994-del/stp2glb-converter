name: Build Windows EXE

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download Blender (portable)
        shell: pwsh
        run: |
          $blenderVersion = "4.2.0"
          $blenderUrl = "https://download.blender.org/release/Blender4.2/blender-$blenderVersion-windows-x64.zip"
          Write-Host "Downloading Blender $blenderVersion..."
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri $blenderUrl -OutFile blender.zip -UseBasicParsing
          Write-Host "Extracting..."
          Expand-Archive -Path blender.zip -DestinationPath . -Force
          Remove-Item blender.zip
          $extractedDir = Get-ChildItem -Directory | Where-Object { $_.Name -like "blender*" } | Select-Object -First 1
          if ($extractedDir) {
            Write-Host "Found: $($extractedDir.FullName)"
            Move-Item $extractedDir.FullName blender
          } else {
            Write-Host "ERROR: No Blender directory found"
            Get-ChildItem | Format-Table Name, Mode
            exit 1
          }          

      - name: Verify Blender
        run: |
          if (Test-Path "./blender/blender.exe") {
            echo "SUCCESS: Blender found"
            ./blender/blender.exe --version
          } else {
            echo "FAIL: blender.exe not found"
            Get-ChildItem -Recurse -Name | Select-Object -First 20
            exit 1
          }          

      - name: Build EXE with PyInstaller
        run: |
          echo "=== PyInstaller version ==="
          python -m PyInstaller --version
          echo ""
          echo "=== Running PyInstaller ==="
          python -m PyInstaller converter.spec --noconfirm --clean
          echo ""
          echo "=== Exit code: $LASTEXITCODE ==="
          if ($LASTEXITCODE -ne 0) { exit 1 }          

      - name: List output
        if: success()
        run: |
          echo "=== dist/ contents ==="
          Get-ChildItem -Recurse dist/ | Format-Table FullName, Length -AutoSize          

      - name: Upload EXE artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: STP2GLB_Converter
          path: dist/
          retention-days: 7
