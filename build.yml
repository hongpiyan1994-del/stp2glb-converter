name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Download Blender (portable)
        shell: pwsh
        run: |
          $blenderVersion = "4.2.0"
          $blenderUrl = "https://download.blender.org/release/Blender4.2/blender-$blenderVersion-windows-x64.zip"
          $dest = "blender.zip"

          Write-Host "Downloading Blender from $blenderUrl ..."
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri $blenderUrl -OutFile $dest -UseBasicParsing

          Write-Host "Extracting Blender..."
          Expand-Archive -Path $dest -DestinationPath "." -Force
          Remove-Item $dest

          # 重命名为 blender/
          $extractedDir = (Get-ChildItem -Directory | Where-Object { $_.Name -like "blender*" } | Select-Object -First 1).FullName
          Move-Item $extractedDir blender
          Get-ChildItem blender | Select-Object Name

          Write-Host "Blender ready at ./blender/"

      - name: Verify Blender
        run: |
          ./blender/blender.exe --version

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller converter.spec --noconfirm

      - name: List output
        run: |
          Get-ChildItem -Recurse dist/ | Select-Object FullName, Length

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: STP2GLB_Converter_v${{ inputs.version || '1.0.0' }}
          path: dist/
          retention-days: 7

      - name: Generate checksum
        run: |
          cd dist
          $files = Get-ChildItem -Recurse -File
          foreach ($f in $files) {
            $hash = (Get-FileHash $f.FullName -Algorithm SHA256).Hash
            Write-Host "$($f.Name): $hash"
          }
